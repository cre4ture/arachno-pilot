[deployment]
profile = "jetson-onboard"
compute = "jetson-orin"

[robot]
name = "arachno-pilot"
control_hz = 150
perception_hz = 20

[bus.feetech]
port = "/dev/serial/by-id/usb-1a86_USB_Single_Serial_5B79033507-if00"
baud_rate = 1000000
telemetry_stride = 6

[camera]
name = "Waveshare IMX219-160 IR-CUT"
backend = "argus"
sensor_id = 0
width = 1280
height = 720
fps = 30
fov_deg = 162.4
pixel_format = "NV12"

[imu]
enabled = false
mode = "usb_bridge"
device = "/dev/serial/by-id/usb-Arachno_RP2040_IMU_Bridge_0001-if00"
sample_hz = 200
protocol = "arachno_imu_v1"

[safety]
max_body_pitch_deg = 20.0
max_body_roll_deg = 20.0
max_servo_temp_c = 65
min_bus_voltage_v = 6.4
max_servo_load_pct = 82.0

[learning]
mode = "shadow"
policy_transport = "unix-socket"
policy_path = "artifacts/policies/latest.onnx"

[[legs]]
name = "front_left"
coxa_servo_id = 11
femur_servo_id = 12
tibia_servo_id = 13
coxa_home_ticks = 2048
femur_home_ticks = 2150
tibia_home_ticks = 1850

[[legs]]
name = "middle_left"
coxa_servo_id = 21
femur_servo_id = 22
tibia_servo_id = 23
coxa_home_ticks = 2048
femur_home_ticks = 2150
tibia_home_ticks = 1850

[[legs]]
name = "rear_left"
coxa_servo_id = 31
femur_servo_id = 32
tibia_servo_id = 33
coxa_home_ticks = 2048
femur_home_ticks = 2150
tibia_home_ticks = 1850

[[legs]]
