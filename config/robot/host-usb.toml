[deployment]
profile = "host-usb"
compute = "linux-pc"

[robot]
name = "arachno-pilot"
control_hz = 150
perception_hz = 20

[servo_store]
path = "servo-config.toml"

[pose_store]
path = "servo-poses.toml"

[workspace_store]
path = "leg-workspace.toml"

[semantic_calibration_store]
path = "servo-semantic-calibration.toml"

[camera]
name = "Logitech Webcam C250"
backend = "v4l2"
device = "/dev/v4l/by-id/usb-046d_0804_2F904660-video-index0"
width = 640
height = 480
fps = 30
fov_deg = 60.0
pixel_format = "MJPG"

[imu]
enabled = true
mode = "usb_bridge"
device = "/dev/serial/by-id/usb-arachno-pilot_RP2040_IMU_bridge_arachno-imu-bridge-0001-if00"
sample_hz = 200
protocol = "arachno_imu_v1"
reference_forward_sensor = [0.0, 0.0, 1.0]
reference_down_sensor = [-0.999980, 0.005598, -0.002893]

[learning]
mode = "shadow"
policy_transport = "unix-socket"
policy_path = "artifacts/policies/latest.onnx"

[simulation]
body_mass_kg = 1.8
body_size_cm = [20.0, 15.0, 5.5]
foot_radius_cm = 0.8
ground_friction = 1.0
joint_damping = 0.08
servo_response_hz = 12.0
max_servo_speed_deg_s = 240.0
