# Shared servo map, bus, safety, and locomotion settings for the physical hexapod.
# Deployment profiles load this file through [servo_store].
# Kinematic lengths are expressed in centimeters via *_length_cm.

[bus.feetech]
port = "/dev/serial/by-id/usb-1a86_USB_Single_Serial_5B79033507-if00"
baud_rate = 1000000
telemetry_stride = 6

[[servo_eeprom.entries]]
name = "status_return_level"
address = 8
width = "u8"
value = 1

[[servo_eeprom.entries]]
name = "max_torque_limit"
address = 16
width = "u16"
value = 400

[safety]
max_body_pitch_deg = 20.0
max_body_roll_deg = 20.0
max_servo_temp_c = 65
# Set to 0.0 to keep low-voltage as telemetry-only during stand-up tuning.
min_bus_voltage_v = 0.0
max_servo_load_pct = 82.0

[locomotion]
command_hz = 20

[locomotion.stand_up]
duration_seconds = 24.0

[locomotion.lay_down]
duration_seconds = 6.0

[locomotion.stand]
settle_seconds = 2.5

[locomotion.tripod]
settle_seconds = 2.5
cycle_seconds = 5.0
stride_ticks = 20
femur_lift_ticks = 12
tibia_lift_ticks = 18

[[legs]]
name = "front_left"
coxa_servo_id = 11
femur_servo_id = 12
tibia_servo_id = 13
coxa_stand_reference_ticks = 2048
