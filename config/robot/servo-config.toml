# Shared servo map, bus, safety, locomotion tuning, semantic zero-reference ticks, and kinematic settings
# for the physical hexapod. Deployment profiles load this file through [servo_store].
# Named poses such as stand-reference, lay-down, and zero-pose live separately in servo-poses.toml.
# Kinematic lengths are expressed in centimeters via *_length_cm.

[bus.feetech]
# The current control loop still opens the legs Feetech bus only.
port = "/dev/serial/by-id/usb-1a86_USB_Single_Serial_5B61036419-if00"
additional_ports = ["/dev/serial/by-id/usb-1a86_USB_Single_Serial_5B61036984-if00"]
baud_rate = 1000000
telemetry_stride = 6

[[servo_eeprom.entries]]
name = "status_return_level"
address = 8
width = "u8"
value = 1

[[servo_eeprom.entries]]
name = "max_torque_limit"
address = 16
width = "u16"
value = 400

[safety]
max_body_pitch_deg = 20.0
max_body_roll_deg = 20.0
max_servo_temp_c = 65
# Set to 0.0 to keep low-voltage as telemetry-only during stand-up tuning.
min_bus_voltage_v = 0.0
max_servo_load_pct = 82.0

[locomotion]
command_hz = 20

[locomotion.stand_up]
duration_seconds = 24.0

[locomotion.lay_down]
duration_seconds = 6.0

[locomotion.sit_down]
duration_seconds = 4.0

[locomotion.stand]
settle_seconds = 2.5

[locomotion.tripod]
settle_seconds = 2.5
cycle_seconds = 5.0
stride_ticks = 20
femur_lift_ticks = 20
tibia_lift_ticks = 30
high_step_height_cm = 10.0

[[legs]]
name = "front_left"
coxa_servo_id = 11
femur_servo_id = 12
tibia_servo_id = 13
coxa_zero_reference_ticks = 2125
femur_zero_reference_ticks = 2061
tibia_zero_reference_ticks = 2036
coxa_forward_sign = -1
femur_lift_sign = -1
tibia_lift_sign = 1
coxa_zero_heading_deg = 45.0
coxa_length_cm = 3.0
femur_length_cm = 8.5
tibia_length_cm = 14.5

